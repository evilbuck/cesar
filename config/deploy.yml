# Kamal 2 Deployment Configuration for Cesar Transcription Service

service: cesar
image: cesar

# Deploy to these servers
servers:
  web:
    - 72.60.126.128

# Enable SSL auto certification via Let's Encrypt
proxy:
  ssl: true
  host: transcribely.releaseoften.com
  healthcheck:
    path: /health
    interval: 10
    timeout: 30

# Docker registry credentials (Proxmox LXC 104)
# Docs: docs/registry-reference.md
registry:
  server: 100.83.73.13:5000
  username: buck
  password:
    - KAMAL_REGISTRY_PASSWORD


# Environment variables
env:
  clear:
    CESAR_HOST: "0.0.0.0"
    CESAR_PORT: "8000"
    CESAR_DB_PATH: "/app/data/jobs.db"
    WEB_DIR: "/app/cesar/web"
    PYTHONUNBUFFERED: "1"

# Persistent storage for job database and cache
volumes:
  - "cesar_data:/app/data"
  - "cesar_cache:/app/.cache"

# Configure the image builder
builder:
  arch: amd64
  args:
    GIT_COMMIT: "$(git rev-parse HEAD)"
    GIT_BRANCH: "$(git rev-parse --abbrev-ref HEAD)"
    BUILD_DATE: "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

# Aliases for common commands
aliases:
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  python: app exec --interactive --reuse "python"
